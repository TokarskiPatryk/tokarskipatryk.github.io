baseURL = "https://patryktokarski.com/"
title = "Patryk Tokarski"
theme = "hugo-coder"
languageCode = "en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableEmoji = true
enableRobotsTXT = true

[pagination]
pagerSize = 10

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    style = "github-dark"

[params]
  author = "Patryk Tokarski"
  info = "Data Engineer"
  description = "Patryk Tokarski's personal site"
  keywords = "Patryk Tokarski, data engineer, Python, SQL, Snowflake, Azure, blog"
  avatarURL = "images/avatar.jpg"
  since = 2026
  colorScheme = "auto"
  hideColorSchemeToggle = false
  enableTwemoji = false
  customSCSS = ["scss/site.scss"]

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"
  author = "authors"

